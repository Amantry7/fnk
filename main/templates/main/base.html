{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.brand_name }} — финансовый консалтинг для бизнеса{% endblock %}</title>
    <meta name="description" content="{{ site.brand_name }} — финансово-консалтинговая компания. {{ site.hero_lead }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'img/logo-sm.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% include 'main/_header.html' %}

    {% block content %}{% endblock %}

    {% include 'main/_footer.html' %}

    <a href="#hero" class="to-top" aria-label="Наверх">↑</a>

    <script src="{% static 'js/main.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

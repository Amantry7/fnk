services:
  web:
    build: .
    image: fnk-web
    container_name: fnk_web
    restart: always
    env_file: .env
    environment:
      - DB_PATH=/app/data/db.sqlite3
      - MEDIA_ROOT=/app/media
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    ports:
      # Слушаем только localhost — наружу открывает nginx + Cloudflare tunnel
      - "127.0.0.1:14010:8000"
